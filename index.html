<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记事本 - Notebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="logo">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <rect width="64" height="64" rx="16" fill="#3ECF71"/>
                    <path d="M20 16h24a4 4 0 014 4v24a4 4 0 01-4 4H20a4 4 0 01-4-4V20a4 4 0 014-4z" fill="white"/>
                    <path d="M24 28h16M24 36h12" stroke="#3ECF71" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>记事本</h1>
                <p>简单、安全的笔记应用</p>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="邮箱地址" autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="密码" autocomplete="current-password">
                </div>
                <div class="btn-group">
                    <button id="login-btn" class="btn btn-primary">登录</button>
                    <button id="signup-btn" class="btn btn-secondary">注册</button>
                </div>
                <div id="login-message" class="message hidden"></div>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="app-screen" class="screen">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="user-avatar">U</div>
                    <span id="user-email">user@example.com</span>
                </div>
                <button id="logout-btn" class="btn-icon" title="退出登录">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
            
            <div class="sidebar-actions">
                <button id="new-note-btn" class="btn btn-primary btn-block">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    新建笔记
                </button>
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="搜索笔记...">
                </div>
            </div>

            <div class="notes-list" id="notes-list">
                <!-- 笔记列表动态生成 -->
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 空状态 -->
            <div id="empty-state" class="empty-state active">
                <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
                    <rect x="20" y="10" width="80" height="100" rx="8" stroke="#3ECF71" stroke-width="2" fill="none"/>
                    <line x1="35" y1="35" x2="85" y2="35" stroke="#3ECF71" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="50" x2="85" y2="50" stroke="#3ECF71" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="65" x2="65" y2="65" stroke="#3ECF71" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h2>选择或创建笔记</h2>
                <p>从左侧选择一篇笔记，或点击"新建笔记"开始创作</p>
            </div>

            <!-- 编辑器 -->
            <div id="editor" class="editor hidden">
                <div class="editor-header">
                    <input type="text" id="note-title" placeholder="笔记标题" class="title-input">
                    <div class="editor-actions">
                        <span id="last-saved" class="save-status">未保存</span>
                        <button id="delete-note-btn" class="btn-icon btn-danger" title="删除笔记">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3,6 5,6 21,6"/>
                                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <textarea id="note-content" placeholder="开始写作..." class="content-input"></textarea>
            </div>
        </main>
    </div>

    <!-- 确认删除对话框 -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3>确认删除</h3>
            <p>确定要删除这篇笔记吗？此操作不可撤销。</p>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="btn btn-secondary">取消</button>
                <button id="confirm-delete-btn" class="btn btn-danger">删除</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast hidden"></div>

    <!-- 使用 ES 模块加载应用代码 -->
    <script type="module" src="app.js"></script>
</body>
</html>
